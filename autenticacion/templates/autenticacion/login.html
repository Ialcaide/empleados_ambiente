{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'autenticacion/css/styles.css' %}">
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-person-circle"></i>
        <h4>Iniciar Sesión</h4>
        <p class="mb-0 opacity-75">CRUD Empleados — UNEMI</p>
    </div>
    <div class="auth-body">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-circle me-2"></i>{{ message }}
            </div>
            {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-person me-1"></i>Usuario
                </label>
                <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn-auth">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
        </form>
        <div class="auth-footer">
            ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate aquí</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
