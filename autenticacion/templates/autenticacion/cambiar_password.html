{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'autenticacion/css/styles.css' %}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow" style="border-radius: 16px;">
                <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #1e6091, #2196f3); border-radius: 16px 16px 0 0;">
                    <i class="bi bi-lock" style="font-size: 3rem;"></i>
                    <h4 class="mt-2 mb-0">Cambiar Contraseña</h4>
                </div>
                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            <i class="bi bi-info-circle me-2"></i>{{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            <input type="password" name="{{ field.html_name }}" class="form-control" placeholder="{{ field.label }}">
                            {% if field.errors %}
                            <div class="text-danger mt-1" style="font-size: 0.85rem;">
                                <i class="bi bi-exclamation-circle me-1"></i>{{ field.errors|join:", " }}
                            </div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-check-circle me-1"></i>Actualizar
                            </button>
                            <a href="{% url 'perfil' %}" class="btn btn-secondary w-100">
                                <i class="bi bi-x-circle me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
