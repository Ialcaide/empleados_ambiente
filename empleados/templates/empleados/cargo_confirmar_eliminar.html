{% extends 'empleados/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow text-center">
            <div class="card-header py-3" style="background: linear-gradient(135deg, #c0392b, #e74c3c);">
                <h5 class="mb-0 text-white"><i class="bi bi-trash me-2"></i>Confirmar Eliminación</h5>
            </div>
            <div class="card-body p-4">
                <i class="bi bi-exclamation-triangle text-danger mb-3" style="font-size: 3rem;"></i>
                <p class="fs-5">¿Estás segura de eliminar el cargo <strong>{{ objeto }}</strong>?</p>
                <p class="text-muted small">Esta acción no se puede deshacer.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i>Sí, eliminar
                        </button>
                        <a href="{% url 'cargo_lista' %}" class="btn btn-secondary px-4">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
