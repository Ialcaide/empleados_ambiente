{% extends 'empleados/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header py-3">
                <h5 class="mb-0"><i class="bi bi-briefcase me-2"></i>{{ titulo }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger mt-1" style="font-size: 0.85rem;">
                            <i class="bi bi-exclamation-circle me-1"></i>{{ field.errors|join:", " }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-circle me-1"></i>Guardar
                        </button>
                        <a href="{% url 'cargo_lista' %}" class="btn btn-secondary w-100">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
