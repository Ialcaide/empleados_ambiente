{% extends 'empleados/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Lista de Cargos</h2>
    <a href="{% url 'cargo_crear' %}" class="btn btn-primary">+ Nuevo Cargo</a>
</div>

<table class="table table-bordered table-hover">
    <thead class="table-primary">
        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for cargo in cargos %}
        <tr>
            <td>{{ cargo.id }}</td>
            <td>{{ cargo.nombre }}</td>
            <td>{{ cargo.descripcion }}</td>
            <td>
                <a href="{% url 'cargo_editar' cargo.pk %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'cargo_eliminar' cargo.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">No hay cargos registrados.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
