{% extends 'empleados/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Lista de Cargos</h2>
    <a href="{% url 'cargo_crear' %}" class="btn btn-primary">+ Nuevo Cargo</a>
</div>

<!-- Barra de búsqueda siempre visible -->
<form method="GET" class="mb-3">
    <div class="row g-2">
        <div class="col">
            <input type="text" name="q" class="form-control" placeholder="Buscar por nombre o descripción..." value="{{ query }}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
        <div class="col-auto">
            <a href="{% url 'cargo_lista' %}" class="btn btn-secondary">Limpiar</a>
        </div>
    </div>
</form>

<table class="table table-bordered table-hover">
    <thead class="table-primary">
        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for cargo in cargos %}
        <tr>
            <td>{{ cargo.id }}</td>
            <td>{{ cargo.nombre }}</td>
            <td>{{ cargo.descripcion }}</td>
            <td>
                <a href="{% url 'cargo_editar' cargo.pk %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'cargo_eliminar' cargo.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">No se encontraron cargos.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
