{% extends 'empleados_vbc/base.html' %}

{% block content %}
<div class="card shadow" style="max-width: 500px; margin: auto;">
    <div class="card-header bg-danger text-white">
        <h4>Confirmar Eliminación</h4>
    </div>
    <div class="card-body text-center">
        <p class="fs-5">¿Estás segura de eliminar al empleado <strong>{{ objeto }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'vbc_empleado_lista' %}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
