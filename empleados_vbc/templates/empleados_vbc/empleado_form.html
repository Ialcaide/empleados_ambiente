{% extends 'empleados_vbc/base.html' %}

{% block content %}
<div class="card shadow" style="max-width: 600px; margin: auto;">
    <div class="card-header bg-primary text-white">
        <h4>{{ titulo }}</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">Guardar</button>
            <a href="{% url 'vbc_empleado_lista' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
